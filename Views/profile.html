<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adProfile</title>
    <link rel="stylesheet" href="..Resources/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Merriweather+Sans">
    <link rel="stylesheet" href="..Resources/css/Profile-Edit-Form.css">
    <link rel="stylesheet" href="..Resources/css/Profile-Edit-Form.css">
    <!--<link rel="stylesheet" href="..Resources/css/styles.css">-->
</head>

<body style="font-family:'Merriweather Sans', sans-serif; ">
    <div class="container profile profile-view" id="profile" style="padding-top:0px;">
        <div class="row">
            <div class="col-md-12 alert-col relative">
                <h6 style="margin-top:50px;">Pages &gt; Profile</h6>
            </div>
            <div class="col">
                <h3 style="margin-top:10px;">Profile</h3>
                <hr>
            </div>
        </div>
        <form>
            <div class="form-row profile-row">
                <div class="col-md-4 relative">
                    <div class="avatar">
                        <div class="avatar-bg center" style="height:175px;width:175px;"></div>
                    </div><input type="file" class="form-control" name="avatar-file" style="height:38px;margin-top:5px;padding-top:3px;"></div>
                <div class="col-md-8">
                    <h4 style="color:#3786d5;margin-top:10px;">Basic Information</h4>
                    <div class="form-row" style="margin-top:24px;">
                        <div class="col-sm-12 col-md-6">
                            <div class="form-group"><label>Firstname </label><input class="form-control" type="text" name="firstname"></div>
                        </div>
                        <div class="col-sm-12 col-md-6">
                            <div class="form-group"><label>Lastname </label><input class="form-control" type="text" name="lastname"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="col-sm-12 col-md-6">
                            <div class="form-group"><label>Email </label><input class="form-control" type="email" autocomplete="off" required="" name="email"></div>
                        </div>
                        <div class="col-sm-12 col-md-6">
                            <div class="form-group"><label>Phone</label><input class="form-control" type="password" name="confirmpass" autocomplete="off" required=""></div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <hr>
        <form style="margin-top:30px;">
            <h4 style="color:#3786d5;">Address Information</h4>
            <div class="form-row" style="margin-top:20px;">
                <div class="col">
                    <div class="form-group"><label>Address</label><input class="form-control" type="email" autocomplete="off" required="" name="email"></div>
                </div>
            </div>
            <div class="form-row">
                <div class="col-sm-12 col-md-6">
                    <div class="form-group"><label>City</label><input class="form-control" type="text" name="firstname"></div>
                </div>
                <div class="col-sm-12 col-md-6">
                    <div class="form-group"><label>Country</label><input class="form-control" type="text" name="lastname"></div>
                </div>
            </div>
        </form>
        <hr>
        <form style="margin-top:30px;">
            <h4 style="color:#3786d5;">Change Password</h4>
            <div class="form-row" style="margin-top:20px;">
                <div class="col-sm-12 col-md-4">
                    <div class="form-group" style="width:348px;"><label>Current Password</label><input class="form-control" type="password"></div>
                </div>
                <div class="col-sm-12 col-md-4" style="width:310px;padding-left:12px;">
                    <div class="form-group" style="width:348px;"><label>New Password</label><input class="form-control" type="password"></div>
                </div>
                <div class="col-sm-12 col-md-4" style="width:310px;padding-left:12px;">
                    <div class="form-group" style="width:348px;"><label>Confirm Password</label><input class="form-control" type="password"></div>
                </div>
            </div>
        </form>
        <hr>
        <div class="row">
            <div class="col-md-12 content-right"><button class="btn btn-primary form-btn" type="submit">SAVE </button><button class="btn btn-danger form-btn" type="reset" style="background-color:rgb(255,255,255);color:rgb(0,0,0);/*box-shadow:0 0 0 .2rem rgba(55, 134, 213, .5);*/outline:2px solid #3786D5;border-color:#3786D5;">CANCEL </button><button class="btn btn-primary form-btn" type="button" data-toggle="modal" data-target="#profileModal">Button</button></div>
    
        </div>
    </div>
    <!--<div class="modal fade" id="testModal" role="dialog" tabindex="-1">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header" style="background-color:#3786D5;">
                    <h4 class="modal-title" style="color:white;">Confirmation</h4><button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">×</span></button></div>
                <div class="modal-body">
                    <p>Are you sure ?</p>

                <div class="modal-footer"><a href="#" class="btn btn-primary">Yes</a><button class="btn btn-primary" type="button"  data-dismiss="modal">No</button></div>
            </div>
        </div>
    </div>-->
    <div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="profileModalLabel">Profile Modal</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <!-- Modal content -->
              This is the modal for the profile page.
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <button type="button" class="btn btn-primary" data-dismiss="modal">Save changes</button>
            </div>
          </div>
        </div>
      </div>
    <script src="..Resources/js/jquery.min.js"></script>
    <script src="..Resources/bootstrap/js/bootstrap.min.js"></script>
    <script src="..Resources/js/Profile-Edit-Form.js"></script>
</body>

</html>
